name: Deploy

# Legacy repo (localStorage-only, "for local use"). Minimal pipeline: publish the static
# files to GitHub Pages. The site currently serves from the classic branch source, so the
# deploy job is a NO-OP until you switch Settings -> Pages -> Source -> "GitHub Actions";
# then it auto-activates. Until then the existing site keeps serving untouched.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  guard:
    name: Is Pages on the GitHub Actions source?
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.active }}
    steps:
      - name: Check Pages build type
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bt=$(gh api "repos/${{ github.repository }}/pages" --jq '.build_type' 2>/dev/null || echo none)
          if [ "$bt" = "workflow" ]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Pages source is '$bt' (not 'workflow'); skipping the Actions deploy — the existing site keeps serving. Enable this pipeline via Settings -> Pages -> Source -> GitHub Actions."
          fi

  pages:
    name: Publish to GitHub Pages
    needs: guard
    if: needs.guard.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
